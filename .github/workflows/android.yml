name: Build Android APK

on:
  workflow_dispatch: # Allows you to manually trigger the build from GitHub

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (For Capacitor CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK (For Android Build)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Prepare Web Assets
        run: |
          # Create a dedicated directory for the app payload
          mkdir www
          # Copy only the necessary frontend files to prevent bloating the APK
          cp -r css js data index.html manifest.json service-worker.js www/

      - name: Initialize Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          # Initialize the wrapper pointing to our isolated 'www' folder
          npx cap init "Kenya 50 FOSS" "com.kenya50.foss" --web-dir "www"
          
      - name: Add Android Platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Compile Android APK
        run: |
          cd android
          # Build the debug APK using Gradle
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kenya-50-foss.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
